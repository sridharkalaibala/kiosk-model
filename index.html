<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk Internal Layout Viewer</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="viewer" aria-label="3D kiosk layout viewer"></section>
      <aside id="panel" aria-label="Viewer controls">
        <h1>Kiosk Layout</h1>
        <label>
          Box preset
          <select id="preset">
            <option value="compact">Compact 380 x 300 x 260</option>
            <option value="prototype">Prototype 400 x 320 x 280</option>
          </select>
        </label>
        <label>
          Monitor reference
          <select id="monitor">
            <option value="24">24 inch visual ref</option>
            <option value="21.5">21.5 inch visual ref</option>
            <option value="15">15 inch visual ref</option>
          </select>
        </label>
        <label class="check">
          <input id="explode" type="checkbox" />
          Slightly separate parts
        </label>
        <label class="check">
          <input id="show-labels" type="checkbox" />
          Show 3D labels
        </label>
        <label class="check">
          <input id="show-wires" type="checkbox" checked />
          Show airflow / wires
        </label>
        <label class="check">
          <input id="show-readout" type="checkbox" checked />
          Show measurements list
        </label>
        <div class="control-group" aria-label="Rotation controls">
          <span>Orbit view</span>
          <div class="orbit-pad" aria-label="Orbit view controls">
            <button id="orbit-up" class="orbit-btn orbit-up" type="button" aria-label="Rotate up"></button>
            <button id="orbit-left" class="orbit-btn orbit-left" type="button" aria-label="Rotate left"></button>
            <button id="orbit-reset" class="orbit-btn orbit-reset" type="button" aria-label="Reset view"></button>
            <button id="orbit-right" class="orbit-btn orbit-right" type="button" aria-label="Rotate right"></button>
            <button id="orbit-down" class="orbit-btn orbit-down" type="button" aria-label="Rotate down"></button>
          </div>
          <label class="check">
            <input id="auto-rotate" type="checkbox" />
            Auto rotate 360
          </label>
        </div>
        <dl id="readout"></dl>
      </aside>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
